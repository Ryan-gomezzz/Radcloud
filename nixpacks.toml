[phases.setup]
# python311 alone has no pip; include pip for `python -m pip install`
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "cd backend && python -m pip install --upgrade pip && python -m pip install -r requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "rm -rf backend/static && mkdir -p backend/static && cp -r frontend/dist/* backend/static/",
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
